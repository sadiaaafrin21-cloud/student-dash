<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="container">

    <header>
        <h1><i class="fa-solid fa-graduation-cap"></i> Student Management System</h1>
        <p>Manage Students Easily & Professionally</p>
    </header>

    <div class="card">

        <h2>Add Student</h2>

        <div class="form-grid">

            <input type="text" id="name" placeholder="Student Name">

            <input type="text" id="id" placeholder="Student ID">

            <select id="department">
                <option value="">Select Department</option>
                <option>CSE</option>
                <option>EEE</option>
                <option>BBA</option>
                <option>English</option>
                <option>Law</option>
            </select>

            <input type="number" id="cgpa"
                placeholder="CGPA"
                min="0"
                max="4"
                step="0.01">

        </div>

        <button id="saveBtn">
            <i class="fa-solid fa-floppy-disk"></i>
            Save Student
        </button>

    </div>


    <div class="card">

        <div class="toolbar">

            <input type="text"
                id="search"
                placeholder="Search Student...">

            <select id="filter">
                <option>All Departments</option>
                <option>CSE</option>
                <option>EEE</option>
                <option>BBA</option>
                <option>English</option>
                <option>Law</option>
            </select>

        </div>

        <table>

            <thead>

                <tr>
                    <th>Name</th>
                    <th>ID</th>
                    <th>Department</th>
                    <th>CGPA</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
